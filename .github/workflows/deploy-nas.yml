name: Deploy to Synology NAS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Trust NAS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.NAS_PORT }}" "${{ secrets.NAS_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH authentication
        env:
          SSHPASS: ${{ secrets.NAS_PASSWORD }}
        run: |
          sshpass -e ssh \
            -o PreferredAuthentications=keyboard-interactive,password \
            -o KbdInteractiveAuthentication=yes \
            -o NumberOfPasswordPrompts=1 \
            -o PubkeyAuthentication=no \
            -p "${{ secrets.NAS_PORT }}" \
            "${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }}" \
            "echo connected"

      - name: Package repository
        run: |
          rm -f /tmp/sfvisual-deploy.tgz
          tar \
            --exclude=".git" \
            --exclude="backend/.env" \
            --exclude="sfvisual-deploy.tgz" \
            -czf /tmp/sfvisual-deploy.tgz .

      - name: Upload package to NAS
        env:
          SSHPASS: ${{ secrets.NAS_PASSWORD }}
        run: |
          sshpass -e scp \
            -o PreferredAuthentications=keyboard-interactive,password \
            -o KbdInteractiveAuthentication=yes \
            -o NumberOfPasswordPrompts=1 \
            -o PubkeyAuthentication=no \
            -P "${{ secrets.NAS_PORT }}" \
            /tmp/sfvisual-deploy.tgz \
            "${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }}:/tmp/sfvisual-deploy.tgz"

      - name: Deploy on NAS
        env:
          SSHPASS: ${{ secrets.NAS_PASSWORD }}
        run: |
          sshpass -e ssh -o PreferredAuthentications=keyboard-interactive,password -o KbdInteractiveAuthentication=yes -o NumberOfPasswordPrompts=1 -o PubkeyAuthentication=no -p "${{ secrets.NAS_PORT }}" "${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }}" <<EOF
          set -eu
          export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
          DEPLOY_DIR="/volume1/MACARON/RND/SFtools/sfShotManager/app/sfVisual_git"

          mkdir -p "\$DEPLOY_DIR"
          cd "\$DEPLOY_DIR"
          tar xzf /tmp/sfvisual-deploy.tgz -C "\$DEPLOY_DIR"

          if command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD="docker-compose"
          elif [ -x /usr/local/bin/docker-compose ]; then
            COMPOSE_CMD="/usr/local/bin/docker-compose"
          elif [ -x /usr/bin/docker-compose ]; then
            COMPOSE_CMD="/usr/bin/docker-compose"
          elif docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD="docker compose"
          else
            echo "Docker Compose command not found on NAS" >&2
            exit 127
          fi

          if sudo -n true >/dev/null 2>&1; then
            sudo -n \$COMPOSE_CMD up -d --build
            sudo -n \$COMPOSE_CMD ps
          else
            \$COMPOSE_CMD up -d --build
            \$COMPOSE_CMD ps
          fi

          rm -f /tmp/sfvisual-deploy.tgz
          EOF
